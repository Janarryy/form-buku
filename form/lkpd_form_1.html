<html>
	<head>
		<title>Form Pendaftaran Sekolah</title>
	</head>
	<body>
		<fieldset style="width:400px">
			<center> <h1>Form Pendaftaran sekolah</h1> </center>
			<p>
			<h2><center>Informasi Pribadi</h2></center>
			</p>
		<form>
		
			Nama Lengkap :<input type="text" name="nama" size="20">
			<p>
			<label>Alamat :</label> <textarea name="alamat" size="20">
			</textarea>
			</p>
			<p>
			<label>Tanggal Lahir :</label>
			<input type="date" name="day" min="2000-01-02">
			</p>
			<p>
			<center> <h2>Informasi Sekolah :</h2> </center>
			<label>Sekolah Asal</label>
			<input type="text" name="sekolah asal" size="20">
			</p>
			<label>Kelas</label>
			<select name="pilih kelas">
				<option value="Pilih Kelas">
				Pilih Kelas</option>
				<option value="XRPL">
				XRPL</option>
				<option value="XTKJ">
				XTKJ</option>
				<option value="XTKR">
				XTKR</option>
				<option value="XBD">
				XBD</option>
			</select>
			<p>
			<label>Jurusan :</label>
			<input type="text" name="jurusan">
			</p>
				<p>
			<label>Jenis Kelamin:</label>
			<label><input type ="radio" name="Jenis Kelamin" value"laki-laki" />
			Laki-laki</label>
			<label>Jenis Kelamin:</label>
			<label><input type ="radio" name="Jenis Kelamin" value"perempuan" />
			Perempuan</label>
			</p>
			<p align="right">
			<input type="submit" name="submit" value="Daftar">
			</p>
		</fieldset>
		</form>
	</body>
</html>
